[changelog]
header = ""
body = """
## [{{ version }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% for commit in commits %}\
- {{ commit.message | trim }}\n\
{% endfor %}\n
"""
trim = true

[git]
conventional_commits = false
filter_unconventional = false
tag_pattern = "v[0-9].*"
# exclude release bump commits
commit_parsers = [
    { message = "^chore: Release", skip = true },
]
