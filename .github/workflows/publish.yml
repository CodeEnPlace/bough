name: Publish to crates.io

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest

    environment: release
    permissions:
      id-token: write

    steps:
    - uses: actions/checkout@v5

    - uses: dtolnay/rust-toolchain@stable

    - uses: rust-lang/crates-io-auth-action@v1
      id: auth

    - run: cargo publish -p bough-typed-hash-derive
      env:
        CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

    - run: cargo publish -p bough-typed-hash
      env:
        CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

    - run: cargo publish -p bough-core
      env:
        CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

    - run: cargo publish -p bough-cli
      env:
        CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
