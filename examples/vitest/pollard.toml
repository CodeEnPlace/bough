language = "js"
vcs_kind = "jj"
working_dir = "/tmp/pollard-work"
parallelism = 1
report_dir = "/tmp/pollard-report"
ordering = "random"
files = "examples/vitest/src/**/*.js"
sub_dir = "examples/vitest"

[timeout]
absolute = 30
relative = 1.5

[commands]
install = "npm install"
test = "npx vitest run"
