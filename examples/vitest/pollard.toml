language = "js"
vcs_kind = "jj"
parallelism = 1
ordering = "random"
files = "examples/vitest/src/**/*.js"

[directories]
working_dir = "/tmp/pollard-work"
report_dir = "/tmp/pollard-report"
sub_dir = "examples/vitest"

[timeout]
absolute = 30
relative = 1.5

[commands]
install = "npm install"
test = "npx vitest run"
