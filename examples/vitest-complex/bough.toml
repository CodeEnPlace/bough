include = ["**/*"]
exclude = ["**/node_modules/**"]

base_root_dir = "."

init.cmd = "npm install"
test.cmd = "npm run test"

[find]
number = 8
number_per_file = 4
factors = [
  "EncompasingMissedMutationsCount",
  "TSNodeDepth",
]

[timeout]
relative = 3

[lang.js]
include = [
  "src/**/*.js",
  "src/**/*.jsx",
]
exclude = ["**/*.test.*"]

[lang.js.skip]
query = [
  """
(if_statement
  condition: (parenthesized_expression
    (member_expression
      object: (meta_property)
      property: (property_identifier) @_prop))
  (#eq? @_prop "vitest")) @skip
""",
]
