[package]
name = "bough-cli"
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "bough"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive", "env"] }
clap_complete = "4"
bough-core = { path = "../bough-core" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "1.0.3"
serde_yaml = "0.9.34"
serde-value = "0.7.0"

[dev-dependencies]
assert_cmd = "2.1.2"
predicates = "3.1.4"
tempfile = "3.26.0"
